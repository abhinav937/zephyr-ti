# Phase 5 app skeleton: interactive shell on UART0 + GPIO for the blink task.
CONFIG_SHELL=y
CONFIG_GPIO=y

# Plain-text shell: this console terminal does not render VT100 escapes.
# Disabling VT100 commands also disables colors (Kconfig dependency) and the
# cursor-positioning codes ("\e[13C") used in help formatting.
CONFIG_SHELL_VT100_COMMANDS=n

# Name app/task threads so 'kernel threads' is readable.
CONFIG_THREAD_NAME=y
